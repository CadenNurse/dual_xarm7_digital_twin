[workspace]
channels = ["robostack-jazzy", "conda-forge"]
name = "xarm_ws"
platforms = ["linux-64"]
version = "0.1.0"

[activation]
scripts = ["install/setup.bash"]

[activation.env]
RMW_IMPLEMENTATION = "rmw_fastrtps_cpp"
ROS_DOMAIN_ID = "37"
#LD_LIBRARY_PATH = "/opt/OrbbecSDK_v2.8.6/lib:$LD_LIBRARY_PATH"

[tasks]
build = "colcon build"
reset_build = "rm -rf build/ install/ log/"
reset_rviz = "mv ~/.rviz ~/.rviz.bak 2>/dev/null && mv ~/.rviz2 ~/.rviz2.bak 2>/dev/null"
view_frames = "ros2 run tf2_tools view_frames"
launch_process = "ros2 launch xarm_moveit_config dual_xarm7_moveit_realmove.launch.py"

[dependencies]
#Core ROS2 packages
python = ">=3.12.13,<3.13"
ros-jazzy-desktop = ">=0.11.0,<0.12"
ros-jazzy-rmw-implementation = ">=2.15.6,<3"
colcon-common-extensions = ">=0.3.0,<0.4"

#Build Tools
cmake = ">=4.3.3,<5"
make = ">=4.4.1,<5"
pkg-config = ">=0.29.2,<0.30"
compilers = ">=1.11.0,<2"
numpy = ">=2.4.6,<3"

#Moveit2
ros-jazzy-moveit = ">=2.12.4,<3"
ros-jazzy-moveit-resources = ">=3.1.0,<4"

#ros2_control
ros-jazzy-ros2controlcli = ">=4.43.0,<5"
ros-jazzy-controller-manager = ">=4.43.0,<5"
ros-jazzy-joint-trajectory-controller = ">=4.37.0,<5"
ros-jazzy-joint-state-broadcaster = ">=4.37.0,<5"
ros-jazzy-ros2-control = ">=4.43.0,<5"
ros-jazzy-ros2-controllers = ">=4.37.0,<5"
ros-jazzy-ros-testing = ">=0.6.0,<0.7"

#Gazebo Harmonic
ros-jazzy-ros-gz = ">=1.0.19,<2"
ros-jazzy-gz-ros2-control = ">=1.2.17,<2"
ros-jazzy-ros-gz-sim = ">=1.0.19,<2"
ros-jazzy-ros-gz-bridge = ">=1.0.19,<2"

#Rviz2
ros-jazzy-rviz2 = ">=14.1.19,<15"

#xArm specifics
ros-jazzy-xacro = ">=2.1.1,<3"
ros-jazzy-joint-state-publisher = ">=2.4.1,<3"
ros-jazzy-joint-state-publisher-gui = ">=2.4.1,<3"
ros-jazzy-robot-state-publisher = ">=3.3.3,<4"
ros-jazzy-tf2-tools = ">=0.36.19,<0.37"
filelock = ">=3.29.0,<4"

#Camera packages
ros-jazzy-image-transport = ">=5.1.7,<6"
ros-jazzy-image-transport-plugins = ">=4.0.6,<5"
ros-jazzy-compressed-image-transport = ">=4.0.6,<5"
ros-jazzy-image-publisher = ">=5.0.11,<6"
ros-jazzy-camera-info-manager = ">=5.1.7,<6"
ros-jazzy-diagnostic-updater = ">=4.2.6,<5"
ros-jazzy-diagnostic-msgs = ">=5.3.6,<6"
ros-jazzy-statistics-msgs = ">=2.0.3,<3"
ros-jazzy-backward-ros = ">=1.0.8,<2"
ros-jazzy-orbbec-camera = ">=1.5.13,<2"
ros-jazzy-orbbec-description = ">=1.5.13,<2"

#Process
#cadennurse@UFactory-PC: cd ~/xarm_ws
#cadennurse@UFactory-PC:~/xarm_ws$ pixi shell
#(xarm_ws) cadennurse@UFactory-PC:~/xarm_ws$ colcon build
#(xarm_ws) cadennurse@UFactory-PC:~/xarm_ws$ source install/setup.bash
#(xarm_ws) cadennurse@UFactory-PC:~/xarm_ws$ ros2 launch xarm_moveit_config dual_xarm7_moveit_realmove.launch.py
